<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conference AI Assistant v3</title>
<style>
  :root {
    --bg:       #f5f0e8;
    --surface:  #ede8df;
    --border:   #d8d0c4;
    --text:     #2d2a26;
    --muted:    #8a8070;
    --accent:   #6b5d4f;
    --green:    #3a7d55;
    --yellow:   #a07020;
    --red:      #b84040;
    --orange:   #9a6020;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }
  .controls { display: flex; gap: 6px; }
  .controls button {
    font-family: inherit;
    font-size: 12px;
    padding: 4px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text);
    transition: all 0.15s;
  }
  .controls button:hover { background: #d8d0c4; }
  #btn-start  { color: var(--green);  border-color: var(--green); }
  #btn-pause  { color: var(--yellow); border-color: var(--yellow); }
  #btn-end    { color: var(--red);    border-color: var(--red); }
  .controls button:disabled { opacity: 0.3; cursor: default; }
  #status {
    margin-left: auto;
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Main panels ────────────────────────────────────────── */
  .panels {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    min-width: 0;
  }
  .panel:last-child { border-right: none; }
  .panel-title {
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  /* ── Transcript lines ───────────────────────────────────── */
  .line { line-height: 1.5; word-wrap: break-word; }
  .line .ts { color: var(--muted); font-size: 11px; margin-right: 6px; }
  .line .lang { color: var(--orange); font-size: 11px; margin-right: 4px; }

  /* ── Agent messages ─────────────────────────────────────── */
  .msg { padding: 6px 0; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
  .msg + .msg { border-top: 1px solid var(--border); }
  .msg.user       .role { color: var(--accent); }
  .msg.assistant  .role { color: var(--green); }
  .msg.system     .role { color: var(--yellow); }
  .msg.error      .role { color: var(--red); }
  .role { font-weight: 600; margin-right: 6px; }

  /* ── Input bar ──────────────────────────────────────────── */
  .input-bar {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
  }
  .input-bar label { color: var(--accent); font-weight: 600; white-space: nowrap; }
  .input-bar input {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  .input-bar input:focus { border-color: var(--accent); }
  .input-bar button {
    font-family: inherit;
    font-size: 12px;
    padding: 6px 14px;
    background: var(--accent);
    color: #f5f0e8;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
  }
  .input-bar button:hover { opacity: 0.85; }

  /* ── Scrollbar ──────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Conference AI Assistant</h1>
  <div class="controls">
    <button id="btn-start">Start</button>
    <button id="btn-pause" disabled>Pause</button>
    <button id="btn-end" disabled>End</button>
  </div>
  <div id="status">Connecting…</div>
</header>

<div class="panels">
  <div class="panel">
    <div class="panel-title">Live Transcript</div>
    <div class="panel-body" id="transcript"></div>
  </div>
  <div class="panel">
    <div class="panel-title">AI Assistant</div>
    <div class="panel-body" id="agent"></div>
  </div>
</div>

<div class="input-bar">
  <label for="query">Ask:</label>
  <input id="query" type="text" placeholder="Type a question or /command…" autocomplete="off">
  <button id="btn-send">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket      = io();
  const $transcript = document.getElementById('transcript');
  const $agent      = document.getElementById('agent');
  const $status     = document.getElementById('status');
  const $query      = document.getElementById('query');
  const $start      = document.getElementById('btn-start');
  const $pause      = document.getElementById('btn-pause');
  const $end        = document.getElementById('btn-end');
  const $send       = document.getElementById('btn-send');

  /* ── State ──────────────────────────────────────────────── */

  socket.on('connect', () => {
    $status.textContent = 'Connected';
  });

  socket.on('state', ({ recordingState }) => {
    $start.disabled = (recordingState === 'recording');
    $pause.disabled = (recordingState !== 'recording');
    $end.disabled   = (recordingState === 'idle');
    $start.textContent = recordingState === 'paused' ? 'Resume' : 'Start';
  });

  socket.on('status', ({ text }) => {
    $status.textContent = text;
  });

  /* ── Transcript ─────────────────────────────────────────── */

  socket.on('transcript', ({ text, time }) => {
    const div  = document.createElement('div');
    div.className = 'line';
    div.innerHTML = `<span class="ts">[${esc(time)}]</span>${esc(text)}`;
    $transcript.appendChild(div);
    $transcript.scrollTop = $transcript.scrollHeight;
  });

  /* ── Agent messages ─────────────────────────────────────── */

  const ROLE_LABELS = {
    user:      'You',
    assistant: 'Agent',
    system:    'System',
    error:     'Error',
  };

  socket.on('agent', ({ role, text }) => {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<span class="role">${ROLE_LABELS[role] || role}:</span>${esc(text)}`;
    $agent.appendChild(div);
    $agent.scrollTop = $agent.scrollHeight;
  });

  /* ── Controls ───────────────────────────────────────────── */

  $start.addEventListener('click', () => socket.emit('start'));
  $pause.addEventListener('click', () => socket.emit('pause'));
  $end.addEventListener('click',   () => socket.emit('end'));

  function sendQuery () {
    const text = $query.value.trim();
    if (!text) return;
    $query.value = '';
    socket.emit('query', text);
  }

  $send.addEventListener('click', sendQuery);
  $query.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendQuery();
  });

  // Auto-focus input
  $query.focus();

  /* ── Helpers ────────────────────────────────────────────── */

  function esc (s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
</script>
</body>
</html>
